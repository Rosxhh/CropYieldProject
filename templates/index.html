{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    
    <!-- Header -->
    <div class="text-center mb-10 animate-[fadeInUp_0.5s_ease-out]">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-agri-100 text-agri-600 text-2xl mb-4 shadow-sm">
            <i class="fa-solid fa-chart-line"></i>
        </div>
        <h2 class="text-3xl md:text-4xl font-extrabold text-slate-800 tracking-tight">Advanced Crop Yield Predictor</h2>
        <p class="text-slate-500 mt-3 text-lg">Enter your farm's complete data for our high-precision AI to estimate your harvest volume.</p>
    </div>

    <!-- Error Alert -->
    {% if error %}
    <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-8 rounded-r-xl shadow-sm animate-[fadeInUp_0.3s_ease-out]">
        <div class="flex">
            <div class="flex-shrink-0">
                <i class="fa-solid fa-circle-exclamation text-red-500"></i>
            </div>
            <div class="ml-3">
                <p class="text-sm text-red-700 font-medium">{{ error }}</p>
            </div>
        </div>
    </div>
    {% endif %}

    <!-- Form Card -->
    <div class="bg-white/80 backdrop-blur-xl rounded-[2.5rem] shadow-2xl border border-slate-100 p-8 md:p-12 animate-[fadeInUp_0.7s_ease-out]">
        <form method="post" class="space-y-8">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                
                <!-- Soil Nutrients Section Header -->
                <div class="md:col-span-3 border-b border-slate-100 pb-2">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest flex items-center">
                        <i class="fa-solid fa-flask mr-2 text-agri-500"></i> Soil Nutrients
                    </h3>
                </div>

                <!-- Nitrogen -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-slate-700 flex justify-between">
                        Nitrogen (N)
                        <span class="text-xs text-agri-500 font-bold" title="Critical for leaf growth and protein formation">?</span>
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-agri-500 text-slate-400">
                            <span class="font-black">N</span>
                        </div>
                        <input type="number" step="any" name="nitrogen" required
                            class="pl-11 w-full rounded-2xl border-2 border-slate-100 bg-slate-50/50 py-3.5 px-4 text-slate-700 hover:bg-white focus:bg-white focus:border-agri-500 focus:ring-4 focus:ring-agri-500/10 transition-all outline-none" placeholder="e.g. 90">
                    </div>
                </div>

                <!-- Phosphorus -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-slate-700 flex justify-between">
                        Phosphorus (P)
                        <span class="text-xs text-agri-500 font-bold" title="Essential for root development and flowering">?</span>
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-agri-500 text-slate-400">
                            <span class="font-black">P</span>
                        </div>
                        <input type="number" step="any" name="phosphorus" required
                            class="pl-11 w-full rounded-2xl border-2 border-slate-100 bg-slate-50/50 py-3.5 px-4 text-slate-700 hover:bg-white focus:bg-white focus:border-agri-500 focus:ring-4 focus:ring-agri-500/10 transition-all outline-none" placeholder="e.g. 42">
                    </div>
                </div>

                <!-- Potassium -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-slate-700 flex justify-between">
                        Potassium (K)
                        <span class="text-xs text-agri-500 font-bold" title="Helps disease resistance and water regulation">?</span>
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-agri-500 text-slate-400">
                            <span class="font-black">K</span>
                        </div>
                        <input type="number" step="any" name="potassium" required
                            class="pl-11 w-full rounded-2xl border-2 border-slate-100 bg-slate-50/50 py-3.5 px-4 text-slate-700 hover:bg-white focus:bg-white focus:border-agri-500 focus:ring-4 focus:ring-agri-500/10 transition-all outline-none" placeholder="e.g. 43">
                    </div>
                </div>

                <!-- Environment Section Header -->
                <div class="md:col-span-3 border-b border-slate-100 pb-2 mt-4">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest flex items-center">
                        <i class="fa-solid fa-cloud-sun mr-2 text-orange-400"></i> Environmental Factors
                    </h3>
                </div>

                <!-- Temperature -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-slate-700">Temperature (°C)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-temperature-three-quarters text-orange-400"></i>
                        </div>
                        <input type="number" step="any" name="temperature" required
                            class="pl-11 w-full rounded-2xl border-2 border-slate-100 bg-slate-50/50 py-3.5 px-4 text-slate-700 hover:bg-white focus:bg-white focus:border-agri-500 focus:ring-4 focus:ring-agri-500/10 transition-all outline-none" placeholder="e.g. 28.5">
                    </div>
                </div>

                <!-- Humidity -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-slate-700">Humidity (%)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-droplet text-cyan-400"></i>
                        </div>
                        <input type="number" step="any" name="humidity" required
                            class="pl-11 w-full rounded-2xl border-2 border-slate-100 bg-slate-50/50 py-3.5 px-4 text-slate-700 hover:bg-white focus:bg-white focus:border-agri-500 focus:ring-4 focus:ring-agri-500/10 transition-all outline-none" placeholder="e.g. 80">
                    </div>
                </div>

                <!-- pH -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-slate-700">Soil pH</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-purple-400">
                            <span class="font-bold text-xs">pH</span>
                        </div>
                        <input type="number" step="any" name="ph" required
                            class="pl-11 w-full rounded-2xl border-2 border-slate-100 bg-slate-50/50 py-3.5 px-4 text-slate-700 hover:bg-white focus:bg-white focus:border-agri-500 focus:ring-4 focus:ring-agri-500/10 transition-all outline-none" placeholder="e.g. 6.5">
                    </div>
                </div>

                <!-- Rainfall -->
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-slate-700">Rainfall (mm)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-cloud-rain text-blue-400"></i>
                        </div>
                        <input type="number" step="any" name="rainfall" required
                            class="pl-11 w-full rounded-2xl border-2 border-slate-100 bg-slate-50/50 py-3.5 px-4 text-slate-700 hover:bg-white focus:bg-white focus:border-agri-500 focus:ring-4 focus:ring-agri-500/10 transition-all outline-none" placeholder="e.g. 120.5">
                    </div>
                </div>

                <!-- Area -->
                <div class="space-y-2 md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700">Farm Area (Hectares)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-ruler-combined text-emerald-500"></i>
                        </div>
                        <input type="number" step="any" name="area" required
                            class="pl-11 w-full rounded-2xl border-2 border-slate-100 bg-slate-50/50 py-3.5 px-4 text-slate-700 hover:bg-white focus:bg-white focus:border-agri-500 focus:ring-4 focus:ring-agri-500/10 transition-all outline-none" placeholder="e.g. 5.2">
                    </div>
                </div>
            </div>

            <div class="pt-6">
                <button type="submit" class="w-full flex justify-center items-center py-5 px-6 rounded-2xl shadow-xl text-xl font-bold text-white bg-gradient-to-r from-agri-500 via-emerald-600 to-agri-600 hover:from-agri-600 hover:to-agri-700 focus:outline-none focus:ring-4 focus:ring-agri-500/30 transform hover:-translate-y-1 transition-all duration-300">
                    <i class="fa-solid fa-wand-magic-sparkles mr-3"></i> Calculate High-Precision Yield
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
